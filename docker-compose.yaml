version: '3.8'

services:
  # --- BACKEND API (Node.js + Express) ---
  # Kết nối với container postgres đã có sẵn: factory_postgres
  backend:
    build: ./backend
    container_name: vattusongbo_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: factory_postgres
      DB_PORT: 5432
      DB_NAME: factory_db
      DB_USER: root_user
      DB_PASSWORD: root_password
      JWT_SECRET: change_this_secret_in_production_please
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:8088
    network_mode: bridge

  # --- FRONTEND (React + Nginx) ---
  frontend:
    build: .
    container_name: vattusongbo_frontend
    restart: always
    ports:
      - "8088:80"
    depends_on:
      - backend
    network_mode: bridge
